bind = CTRL Alt_L, V, submap, passthrough
submap = passthrough
bind = CTRL Alt_L, V, submap, reset
submap = reset


# в–Ҳв–Җв–„в–Җв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–ҲвҖғв–Җв–Ҳв–ҖвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–Ҳ
